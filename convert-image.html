    .btn-primary { background: #667eea; color: white; box-shadow: 0 4px 14px rgba(102,126,234,0.3); }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-primary:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; transform: none; }
    .btn-secondary { background: white; color: #64748b; border: 1px solid #e2e8f0; }

    .modal .btn-row { display: flex; gap: 8px; }

    .progress-wrap.show { display: block; }
    .progress-text { font-size: 13px; color: #64748b; }

<body>

  <div class="main">
    <h1>图片格式转换</h1>
    <p class="subtitle">JPG / PNG / WebP 互转，支持批量处理</p>

        <option value="image/jpeg">JPG</option>

      <div class="progress-text" id="progressText"></div>
    </div>

  <div class="modal-overlay" id="licenseModal">
    <div class="modal">
      <h3>🔑 激活专业版</h3>
      <p>1. 去<b>爱发电</b>赞助 ¥9.9<br>2. 获取 License Key<br>3. 在下方输入激活</p>
      <input type="text" id="licenseInput" placeholder="PDF-XXXX-XXXX-XXXX">
      <div class="modal-msg" id="modalMsg"></div>
      <div class="btn-row">
        <button class="btn btn-outline" id="modalClose">取消</button>
        <button class="btn btn-primary" id="modalActivate">激活</button>
      </div>
      <a class="btn btn-primary" id="buyLink" href="#" target="_blank" style="display:block;margin-top:12px;text-decoration:none;font-size:14px;">💰 去爱发电赞助 ¥9.9</a>
    </div>
  </div>

  <div class="footer">PDFTools © 2026 · 所有文件处理均在浏览器本地完成</div>

  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const AFDIAN_URL = 'https://ifdian.net/a/thd4682';
    const SALT = 'pdftools2026';
    const FREE_LIMIT = 10;
    const files = [];

    function djb2Hash(s) { let h = 5381; for (let i = 0; i < s.length; i++) h = ((h * 33) + s.charCodeAt(i)) >>> 0; return h >>> 0; }
    function hashToChecksum(h) { const ch = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let r = ''; for (let i = 0; i < 4; i++) { r += ch[h % ch.length]; h = Math.floor(h / ch.length); } return r; }
    function validateKey(key) { const m = key.trim().toUpperCase().match(/^PDF-([A-Z0-9]{4})-([A-Z0-9]{4})-([A-Z0-9]{4})$/); if (!m) return false; return m[3] === hashToChecksum(djb2Hash(m[1] + m[2] + SALT)); }
    function isPremium() { try { const d = JSON.parse(localStorage.getItem('pdf-tools-state') || '{}'); if (!(d.license && d.license.valid)) return false; if (!d.license.expiresAt) return true; return Date.now() < d.license.expiresAt; } catch (_) { return false; } }

    function showLicenseModal() { document.getElementById('buyLink').href = AFDIAN_URL; document.getElementById('licenseModal').classList.add('show'); document.getElementById('modalMsg').style.display = 'none'; document.getElementById('licenseInput').value = ''; }
    function hideLicenseModal() { document.getElementById('licenseModal').classList.remove('show'); }
    function activateLicense() {
      const input = document.getElementById('licenseInput').value.trim(), msg = document.getElementById('modalMsg');
      if (!input) { msg.style.display = 'block'; msg.style.color = '#e74c3c'; msg.textContent = '请输入 License Key'; return; }
      if (!validateKey(input)) { msg.style.display = 'block'; msg.style.color = '#e74c3c'; msg.textContent = '无效的 License Key'; return; }
      try { const d = JSON.parse(localStorage.getItem('pdf-tools-state') || '{}'); d.license = { key: input, valid: true, expiresAt: Date.now() + 30 * 24 * 60 * 60 * 1000 }; localStorage.setItem('pdf-tools-state', JSON.stringify(d)); } catch (_) {}
      refreshUI(); hideLicenseModal();
    }

    function refreshUI() {
      const prem = isPremium(), b = document.getElementById('tierBadge'), u = document.getElementById('upgradeBtn'), h = document.getElementById('usageHint');
      if (prem) { b.textContent = '专业版 👑'; b.className = 'badge badge-pro'; u.style.display = 'none'; if (h) { try { const s = JSON.parse(localStorage.getItem('pdf-tools-state') || '{}'); if (s.license && s.license.expiresAt) h.textContent = '剩余 ' + Math.max(0, Math.ceil((s.license.expiresAt - Date.now()) / 86400000)) + ' 天'; } catch(_) {} } }
      else { b.textContent = '免费版'; b.className = 'badge badge-free'; u.style.display = ''; if (h) h.textContent = `剩余 ${FREE_LIMIT - files.length} 张`; }
      const n = document.getElementById('limitNotice');
      if (!prem && files.length >= FREE_LIMIT) n.classList.add('show'); else n.classList.remove('show');
    }

    function addFiles(fileList) {
      for (const f of Array.from(fileList).filter(f => f.type.startsWith('image/'))) {
        if (files.length >= FREE_LIMIT && !isPremium()) { document.getElementById('limitNotice').classList.add('show'); break; }
        if (files.some(x => x.name === f.name && x.size === f.size)) continue;
        files.push(f);
      }
      renderGrid();
    }

    function removeFile(idx) { files.splice(idx, 1); renderGrid(); }

    function renderGrid() {
      const grid = document.getElementById('fileGrid'), ab = document.getElementById('actionBar'), ctrl = document.getElementById('controls'), dz = document.getElementById('dropzone');
      if (files.length === 0) { grid.innerHTML = ''; ab.style.display = 'none'; ctrl.style.display = 'none'; dz.style.display = ''; }
      else {
        dz.style.display = 'none'; ctrl.style.display = 'flex'; ab.style.display = 'flex';
        grid.innerHTML = files.map((f, i) => `
          <div class="file-card">
            <button class="remove-btn" onclick="removeFile(${i})">✕</button>
            <img class="preview" src="${URL.createObjectURL(f)}" alt="${f.name}">
            <div class="fname" title="${f.name}">${f.name}</div>
            <div class="finfo">${(f.size/1024).toFixed(0)} KB</div>
          </div>`).join('');
      }
      refreshUI();
    }

    async function convertAll() {
      const mime = document.getElementById('outputFormat').value, progress = document.getElementById('progressWrap'), text = document.getElementById('progressText');
      progress.classList.add('show');
      for (let i = 0; i < files.length; i++) {
        text.textContent = `正在转换 ${i + 1}/${files.length}: ${files[i].name}`;
        await new Promise(r => setTimeout(r, 50));
        try {
          const bmp = await createImageBitmap(files[i]), canvas = document.createElement('canvas');
          canvas.width = bmp.width; canvas.height = bmp.height;
          canvas.getContext('2d').drawImage(bmp, 0, 0);
          const blob = await new Promise(r => canvas.toBlob(r, mime, 0.92));
          const ext = mime.split('/')[1].replace('jpeg', 'jpg');
          files[i]._converted = blob;
          files[i]._convName = files[i].name.replace(/\.[^.]+$/, '') + '.' + ext;
          files[i]._convUrl = URL.createObjectURL(blob);
          const previewImg = document.querySelectorAll('.file-card')[i]?.querySelector('img');
          if (previewImg) previewImg.src = files[i]._convUrl;
          const infoEl = document.querySelectorAll('.file-card')[i]?.querySelector('.finfo');
          if (infoEl) infoEl.innerHTML = `<span class="success">已转换 → ${(blob.size/1024).toFixed(0)} KB</span>`;
        } catch (err) { console.error(err); }
      }
      text.textContent = `转换完成！`;
      setTimeout(() => progress.classList.remove('show'), 2000);
    }

    async function downloadAllZip() {
      if (!window.JSZip) { alert('JSZip 加载失败'); return; }
      const zip = new JSZip(); let c = 0;
      for (const f of files) { if (f._converted) { zip.file(f._convName, f._converted); c++; } }
      if (!c) { alert('请先转换'); return; }
      const blob = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'converted-images.zip'; a.click();
    }

    function init() {
      refreshUI();
      const dz = document.getElementById('dropzone'), fi = document.getElementById('fileInput');
      dz.addEventListener('click', () => fi.click());
      fi.addEventListener('change', e => { addFiles(e.target.files); fi.value = ''; });
      ['dragover','dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); if (ev === 'dragover') dz.classList.add('drag-over'); else dz.classList.remove('drag-over'); }));
      dz.addEventListener('drop', e => addFiles(e.dataTransfer.files));
      document.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
      document.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); if (!dz.contains(e.target)) addFiles(e.dataTransfer.files); });

      document.getElementById('convertBtn').addEventListener('click', convertAll);
      document.getElementById('downloadAllBtn').addEventListener('click', downloadAllZip);
      document.getElementById('clearBtn').addEventListener('click', () => { files.length = 0; renderGrid(); });
      document.getElementById('upgradeBtn').addEventListener('click', e => { e.preventDefault(); showLicenseModal(); });
      document.getElementById('limitUpgradeLink').addEventListener('click', e => { e.preventDefault(); showLicenseModal(); });
      document.getElementById('modalClose').addEventListener('click', hideLicenseModal);
      document.getElementById('modalActivate').addEventListener('click', activateLicense);
      document.getElementById('licenseInput').addEventListener('keydown', e => { if (e.key === 'Enter') activateLicense(); });
      document.getElementById('licenseModal').addEventListener('click', e => { if (e.target === e.currentTarget) hideLicenseModal(); });
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
